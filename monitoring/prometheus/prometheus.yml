global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/alert-rules.yml"

scrape_configs:
  - job_name: "likefood-app"
    metrics_path: "/api/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["app:3000"]
        labels:
          app: "likefood"
          environment: "production"
